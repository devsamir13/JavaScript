<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Chai aur code</h1>
    <button id="stop">Stop</button>
</body>
<script>
    const sayMyname = function () {
        console.log("Samir");   
    }
    // setTimeout(sayMyname,2000) // setTimeout use to print or perfrom any thing after sometime or delay and it perfrom the task only one time
    
    const change = function () {
        document.querySelector('h1')
        .innerHTML = "Best Js course"   
    }
    const changeMe = setTimeout(change,2000)

    document.querySelector("#stop").
    addEventListener("click", function() {
        clearInterval(changeMe)
        console.log("STOPED");
        
    })
</script>
</html>
