<script>
    const div = document.createElement('div') // use to create element
    console.log(div);
    div.className = "main"
    div.id = Math.round(Math.random() * 10 + 1)

    div.style.padding = "12px"
    // div.innerText = "Chai or Code"
    const addText = document.createTextNode('Chai aur code')  // use to add new element in created element into optimize way
    div.appendChild(addText)

    document.body.appendChild(div) // use to display the created element on the browser (body)
</script>
